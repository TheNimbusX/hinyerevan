<!doctype html>
<html lang="hy" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Logo2026.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="HinYerevan.com — հին Երևանի լուսանկարների արխիվ և քարտեզ։ Ուսումնասիրեք քաղաքի պատկերները ըստ տարիների, հեղինակների և վայրերի։"
    />
    <meta name="robots" content="index, follow" />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#0d1018" />
    <meta property="og:site_name" content="HinYerevan.com" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="hy_AM" />
    <meta property="og:image" content="/Logo2026.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>HinYerevan.com</title>
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem('hinyerevan_theme')
          document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
        try {
          document.documentElement.lang = 'hy'
        } catch (e) {
          document.documentElement.lang = 'hy'
        }
        // Mark when the splash started so the app can keep it visible for a brief minimum.
        window.__splashStart = Date.now()
      })()
    </script>
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 38%, rgba(138, 165, 236, 0.12), transparent 62%),
          #0d1018;
        transition:
          opacity 0.5s ease,
          visibility 0.5s ease;
      }
      html[data-theme='light'] #app-splash {
        background:
          radial-gradient(circle at 50% 38%, rgba(41, 79, 179, 0.08), transparent 62%),
          #ffffff;
      }
      #app-splash.app-splash--hide {
        opacity: 0;
        visibility: hidden;
      }
      /* Splash is a mobile-only intro; never show it on tablet/desktop. */
      @media (min-width: 768px) {
        #app-splash {
          display: none;
        }
      }
      .app-splash__stage {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 26px;
        transition:
          transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          opacity 0.5s ease;
      }
      #app-splash.app-splash--hide .app-splash__stage {
        transform: translateY(-6px) scale(1.04);
        opacity: 0;
      }
      .app-splash__logo-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 150px;
        height: 150px;
      }
      .app-splash__halo {
        position: absolute;
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(41, 79, 179, 0.22), transparent 70%);
        filter: blur(10px);
        animation: splashHalo 2.8s ease-in-out infinite;
      }
      html[data-theme='dark'] .app-splash__halo {
        background: radial-gradient(circle, rgba(138, 165, 236, 0.26), transparent 70%);
      }
      .app-splash__logo {
        position: relative;
        width: 116px;
        height: auto;
        opacity: 0;
        transform: scale(0.85) translateY(10px);
        animation: splashReveal 0.85s cubic-bezier(0.22, 0.8, 0.28, 1) 0.05s forwards;
        filter: drop-shadow(0 12px 24px rgba(13, 16, 24, 0.2));
      }
      html[data-theme='dark'] .app-splash__logo {
        filter: drop-shadow(0 14px 30px rgba(0, 0, 0, 0.55));
      }
      .app-splash__bar {
        position: relative;
        width: 132px;
        height: 3px;
        border-radius: 99px;
        overflow: hidden;
        background: rgba(138, 165, 236, 0.16);
        opacity: 0;
        animation: splashFadeIn 0.6s ease 0.5s forwards;
      }
      html[data-theme='light'] .app-splash__bar {
        background: rgba(41, 79, 179, 0.14);
      }
      .app-splash__bar::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 42%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, #294fb3, transparent);
        animation: splashSlide 1.25s ease-in-out infinite;
      }
      html[data-theme='dark'] .app-splash__bar::before {
        background: linear-gradient(90deg, transparent, #8aa5ec, transparent);
      }
      @keyframes splashReveal {
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }
      @keyframes splashFadeIn {
        to {
          opacity: 1;
        }
      }
      @keyframes splashHalo {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.55;
        }
        50% {
          transform: scale(1.06);
          opacity: 0.95;
        }
      }
      @keyframes splashSlide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-splash__logo {
          animation: splashFadeIn 0.4s ease forwards;
          transform: none;
        }
        .app-splash__halo,
        .app-splash__bar::before {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" role="status" aria-label="HinYerevan">
      <div class="app-splash__stage">
        <div class="app-splash__logo-wrap">
          <span class="app-splash__halo" aria-hidden="true"></span>
          <img class="app-splash__logo" src="/logo-mark.svg" alt="HinYerevan" />
        </div>
        <span class="app-splash__bar" aria-hidden="true"></span>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
